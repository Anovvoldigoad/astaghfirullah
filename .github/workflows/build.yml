name: Build NSC Mod Manager
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract source
        shell: pwsh
        run: Expand-Archive -Path NSC-ModManager-with-CLI.zip -DestinationPath src
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore CLI
        run: dotnet restore "src/NSC-ModManager-CLI/NSC-ModManager-CLI.csproj"
      - name: Build CLI
        run: dotnet build "src/NSC-ModManager-CLI/NSC-ModManager-CLI.csproj" -c Release
      - uses: actions/upload-artifact@v4
        with:
          name: NSC-ModManager-CLI-build
          path: src/NSC-ModManager-CLI/bin/**
