name: Build NSC Mod Manager
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract source
        shell: pwsh
        run: Expand-Archive -Path NSC-ModManager-2.0.1.1-noModernWpf.zip -DestinationPath src
      - uses: actions/setup-dotneton: workflow_dispatch@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore "src/NSC-ModManager-2.0.1.1/NSC-ModManager.csproj"
      - name: Build
        run: dotnet build "src/NSC-ModManager-2.0.1.1/NSC-ModManager.csproj" -c Release
      - uses: actions/upload-artifact@v4
        with:
          name: NSC-ModManager-build
          path: src/NSC-ModManager-2.0.1.1/bin/**
